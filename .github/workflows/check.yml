name: NHL Jersey Check

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Save debug_page.html as a downloadable artifact (dry-run, no email)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  check-jerseys:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run jersey bot
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          if [ "${{ github.event.inputs.debug }}" = "true" ]; then
            python main.py --debug --dry-run
          else
            python main.py
          fi

      - name: Upload debug page
        if: ${{ github.event.inputs.debug == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: fanatics-debug
          path: debug_page.html
          if-no-files-found: warn

      - name: Commit updated state
        if: ${{ github.event.inputs.debug != 'true' }}
        run: |
          git config user.name  "jersey-bot"
          git config user.email "jersey-bot@noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update jersey state [skip ci]"
          git push
